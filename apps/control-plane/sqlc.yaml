version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries/"
    schema: "../../packages/database/prisma/migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db/generated"
        # Usar tipos nativos de pgx en vez de database/sql estándar
        sql_package: "pgx/v5"
        # Emitir tipos para cada query (más type-safe)
        emit_interface: true
        emit_json_tags: true
        emit_db_tags: false
        # Mapear tipos de Postgres a tipos Go
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "numeric"
            go_type: "float64"
