run:
  timeout: 3m

linters:
  enable:
    - gofmt
    - goimports
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gosimple
    - bodyclose       # detecta response bodies sin cerrar (común en Go HTTP)
    - sqlclosecheck    # detecta rows.Close() faltante en queries SQL

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
