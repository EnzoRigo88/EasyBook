version: "3.9"

# docker-compose.dev.yml — ambiente de desarrollo local
# Levanta Postgres + n8n. El control-plane (Go) y dashboard (React)
# corren directo en el host con hot-reload (más rápido para iterar).

services:
  postgres:
    image: postgres:16-alpine
    container_name: easybook-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: easybook
      POSTGRES_PASSWORD: easybook_dev
      POSTGRES_DB: easybook
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easybook"]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: easybook-n8n-dev
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin123
      N8N_ENCRYPTION_KEY: dev-encryption-key-changeme
      WEBHOOK_URL: http://localhost:5678
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: easybook
      DB_POSTGRESDB_USER: easybook
      DB_POSTGRESDB_PASSWORD: easybook_dev
      DB_POSTGRESDB_SCHEMA: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  n8n_data:
